name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Build CSS
        run: npm run build:css

      - name: Build compendium packs
        run: npm run pack:build

      - name: Update system.json version and download URL
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          REPO=${{ github.repository }}
          DOWNLOAD="https://github.com/${REPO}/releases/latest/download/infaernum.zip"
          jq --arg ver "$VERSION" --arg dl "$DOWNLOAD" \
            '.version = $ver | .download = $dl' \
            system.json > system.tmp.json && mv system.tmp.json system.json

      - name: Create release zip
        run: |
          zip -r infaernum.zip \
            module/ templates/ lang/ assets/ packs/ \
            styles/infaernum.css \
            system.json \
            README.md LICENSE \
            --exclude "packs/sources/*"

      - name: Commit updated system.json back to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          cp system.json system.json.release
          git checkout system.json
          cp system.json.release system.json
          git add system.json
          git diff --cached --quiet || git commit -m "chore: bump version to ${GITHUB_REF_NAME} [skip ci]"
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            infaernum.zip
            system.json
          generate_release_notes: true
          fail_on_unmatched_files: true
