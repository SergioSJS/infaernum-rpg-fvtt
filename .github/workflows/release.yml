name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Build CSS
        run: npm run build:css

      - name: Build compendium packs
        run: npm run pack:build

      - name: Update system.json version and download URL
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          REPO=${{ github.repository }}
          DOWNLOAD="https://github.com/${REPO}/releases/download/${GITHUB_REF_NAME}/infaernum-${VERSION}.zip"
          jq --arg ver "$VERSION" --arg dl "$DOWNLOAD" \
            '.version = $ver | .download = $dl' \
            system.json > system.tmp.json && mv system.tmp.json system.json

      - name: Create release zip
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          zip -r "infaernum-${VERSION}.zip" \
            module/ templates/ lang/ assets/ packs/ \
            styles/infaernum.css \
            system.json \
            README.md LICENSE \
            --exclude "packs/sources/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            infaernum-*.zip
            system.json
          generate_release_notes: true
          fail_on_unmatched_files: true
